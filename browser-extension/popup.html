<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px; min-height: 420px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0e17; color: #e2e8f0;
    }
    .header {
      background: linear-gradient(135deg, #1a1f36 0%, #0d1321 100%);
      padding: 16px 20px; border-bottom: 1px solid rgba(99, 179, 237, 0.15);
      display: flex; align-items: center; gap: 12px;
    }
    .header .logo {
      width: 32px; height: 32px; background: linear-gradient(135deg, #4299e1, #48bb78);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold; color: white;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .version { font-size: 10px; color: #718096; margin-top: 2px; }
    
    .status-bar {
      display: flex; padding: 12px 20px; gap: 8px;
      background: rgba(16, 22, 36, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px;
      background: rgba(72, 187, 120, 0.15); color: #48bb78;
    }
    .status-pill.warning { background: rgba(237, 137, 54, 0.15); color: #ed8936; }
    .status-pill.error { background: rgba(245, 101, 101, 0.15); color: #f56565; }
    .status-pill .dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 16px 20px;
    }
    .stat-card {
      background: rgba(26, 32, 53, 0.8); border-radius: 10px;
      padding: 12px; border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-card .label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; color: #63b3ed; }
    .stat-card .value.alert { color: #f56565; }
    .stat-card .value.success { color: #48bb78; }
    
    .section { padding: 12px 20px; }
    .section-title {
      font-size: 11px; font-weight: 600; color: #718096;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    
    .flagged-list { max-height: 140px; overflow-y: auto; }
    .flagged-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; margin-bottom: 4px;
      background: rgba(245, 101, 101, 0.08); border-radius: 6px;
      border-left: 3px solid #f56565; font-size: 12px;
    }
    .flagged-item .domain { font-family: 'Consolas', monospace; }
    .flagged-item .badge {
      font-size: 9px; padding: 2px 6px; border-radius: 4px;
      background: rgba(245, 101, 101, 0.2); color: #f56565; text-transform: uppercase;
    }
    
    .controls { padding: 16px 20px; display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 8px 12px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(66, 153, 225, 0.3); }
    .btn-danger {
      background: rgba(245, 101, 101, 0.15); color: #f56565;
      border: 1px solid rgba(245, 101, 101, 0.3);
    }
    .btn-danger:hover { background: rgba(245, 101, 101, 0.25); }
    .btn-success {
      background: rgba(72, 187, 120, 0.15); color: #48bb78;
      border: 1px solid rgba(72, 187, 120, 0.3);
    }

    .server-input {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      background: rgba(26, 32, 53, 0.8); border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0; font-size: 11px; font-family: 'Consolas', monospace;
      margin-bottom: 8px;
    }
    .server-input:focus { border-color: #4299e1; outline: none; }

    .footer {
      padding: 10px 20px; text-align: center; font-size: 9px; color: #4a5568;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">NF</div>
    <div>
      <h1>NetForensics Monitor</h1>
      <div class="version">v3.0.0 Enterprise</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">Active</span>
    </div>
    <div class="status-pill" id="connPill">
      <span class="dot"></span>
      <span id="connText">Connected</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Requests Captured</div>
      <div class="value" id="totalRequests">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Sent to Server</div>
      <div class="value success" id="totalSent">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Flagged Domains</div>
      <div class="value alert" id="flaggedCount">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Uptime</div>
      <div class="value" id="uptime">0s</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">⚠ Flagged Domains</div>
    <div class="flagged-list" id="flaggedList">
      <div style="font-size: 11px; color: #4a5568; padding: 10px; text-align: center;">
        No flagged domains detected
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Server Configuration</div>
    <input class="server-input" id="serverUrl" placeholder="http://localhost:8000/api/v3/extension/ingest">
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="flushBtn">Flush Now</button>
    <button class="btn btn-danger" id="toggleBtn">Disable</button>
  </div>

  <div class="footer">
    NetForensics SOC Platform • Metadata-only analysis • No content capture
  </div>

  <script src="popup.js"></script>
</body>
</html>
